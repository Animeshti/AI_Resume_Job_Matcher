<!DOCTYPE html>
<html>
<head>
<title>AI Resume Analyzer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #1f4037, #99f2c8);
    color: white;
}

.hero {
    height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
}

.card {
    border-radius: 20px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow">
  <div class="container">
    <span class="navbar-brand"> AI Resume Analyzer</span>
  </div>
</nav>

<!-- HERO SECTION -->
<div class="hero">

    <h1 class="display-4 fw-bold">Analyze Your Resume with AI</h1>
    <p class="lead">Get job matches, skill gaps & smart recommendations instantly</p>

    <!-- ERROR -->
    {% if error %}
    <div class="alert alert-danger w-50 mt-3">
        {{ error }}
    </div>
    {% endif %}

    <!-- UPLOAD CARD -->
    <div class="card p-4 shadow mt-4 text-dark" style="width: 350px;">

        <form action="/upload" method="POST" enctype="multipart/form-data" onsubmit="showLoader()">

            <input type="file" name="resume" class="form-control mb-3" required>

            <button class="btn btn-success w-100">
                Analyze Resume 
            </button>

        </form>

        <!-- LOADER -->
        <div id="loader" class="mt-3" style="display:none;">
            <div class="spinner-border text-success"></div>
            <p>AI is analyzing...</p>
        </div>

        <small class="text-muted mt-2 d-block">PDF / DOCX only</small>

    </div>

</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
